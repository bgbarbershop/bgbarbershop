<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      overflow-x: hidden;
    }
    #planity-container {
      width: 100%;
      transform-origin: top left;
    }
  </style>
</head>
<body>
  <div id="planity-container"></div>

  <script>
    var container = document.getElementById('planity-container');
    window.planity = {
      key: '-O_2Cqy3QxjJ5aSPwMs3',
      primaryColor: '#C0C0C0',
      appointmentContainer: container,
    };
  </script>
  <script src="https://d2skjte8udjqxw.cloudfront.net/widget/production/2/polyfills.latest.js"></script>
  <script src="https://d2skjte8udjqxw.cloudfront.net/widget/production/2/app.latest.js"></script>

  <script>
    function fitWidget() {
      var widget = document.getElementById('planitywl') || document.getElementById('planity') || container;
      if (!widget) return;

      var viewportW = window.innerWidth;
      var widgetW = widget.scrollWidth;

      if (widgetW > viewportW && viewportW > 0) {
        var scale = viewportW / widgetW;
        container.style.transform = 'scale(' + scale + ')';
        container.style.transformOrigin = 'top left';
        container.style.width = (widgetW) + 'px';
        document.body.style.height = Math.ceil(widget.offsetHeight * scale) + 'px';
      }

      // Envia altura ao parent (iframe)
      window.parent.postMessage({ planityHeight: document.body.scrollHeight }, '*');
    }

    setTimeout(fitWidget, 800);
    setTimeout(fitWidget, 2000);
    setTimeout(fitWidget, 4000);

    window.addEventListener('resize', fitWidget);
  </script>
</body>
</html>
